name: CI

# Test and build only. No npm publish.
# Releases: tag v* → publish.yml (see docs/PUBLISHING.md).
# Docs site: dot-skill/skillerr-com (not this repo).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [22, 24]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run test:examples
      - run: npm run pack:check

  brand:
    # Asset generation is OS-independent (pure JS raster/ICO encoding via
    # sharp + png-to-ico), so this runs once on ubuntu rather than across
    # the full matrix above. It proves assets/ is reproducible from
    # assets/skillerr-mark.svg rather than hand-edited out of sync: any
    # drift between the checked-in PNGs/ICO and what the SVG produces
    # fails the build.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/build-brand.mjs
      - run: git diff --exit-code -- assets/
