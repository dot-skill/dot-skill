name: Feature or RFC
description: Propose an additive protocol or library improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: kind
    attributes:
      label: Kind
      options:
        - docs
        - example
        - library
        - runtime adapter
        - registry
        - protocol RFC
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: For RFCs, include schema/field diffs and migration notes.
    validations:
      required: true
  - type: checkboxes
    id: additive
    attributes:
      label: Compatibility
      options:
        - label: This is additive (or I explain a break and migration)
          required: true
