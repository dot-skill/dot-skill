<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Skillerr logo: a scroll with a rising teal wave above the wordmark skill">
  <title>Skillerr logo lockup</title>
  <!--
    Canonical Skillerr full lockup: icon + "skill" wordmark, stacked
    exactly as laid out in the official reference image
    (assets/source/dot-skill-official.png), traced with potrace and
    hand-assembled here as static paths (no <text>, no external fonts)
    so output is byte-reproducible across CI runners.

    This is the FULL LOCKUP variant: used for the OG/social banner
    (og-banner.png) and anywhere a horizontal/README-style logo lockup
    is needed. For the icon-only mark (favicon, app icons, square PNGs)
    see assets/skillerr-mark.svg.

    Background is intentionally transparent (no background rect).

    Palette (sampled directly from the official reference PNG):
      ink  #2B3137 - scroll outline + wordmark
      teal #1CADAA - rising wave
  -->
