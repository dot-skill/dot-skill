<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Skillerr mark: a scroll with a rising teal wave">
  <title>Skillerr mark</title>
  <!--
    Canonical Skillerr icon-only mark (scroll + teal wave, no wordmark).
    Traced from assets/source/dot-skill-official.png (the official
    reference PNG supplied by the brand owner) using potrace, then
    hand-assembled here as a single static SVG so
    scripts/build-brand.mjs produces byte-reproducible output across
    macOS and Linux CI: no <text>, no external fonts, no filters, no
    embedded raster data — only paths.

    This is the ICON-ONLY variant: used for favicon.ico,
    apple-touch-icon.png, and every square skillerr-mark-*.png (the
    square icon slots that can't fit a wordmark legibly). For the
    icon+wordmark lockup (OG banner, README-style horizontal logo) see
    assets/skillerr-lockup.svg.

    Background is intentionally transparent (no background rect) so
    rasterized PNGs composite cleanly onto light or dark chrome.

    Palette (sampled directly from the official reference PNG):
      ink  #2B3137 - scroll outline
      teal #1CADAA - rising wave
  -->
